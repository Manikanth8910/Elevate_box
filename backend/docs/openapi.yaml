openapi: 3.0.0
info:
  title: Document Approval Workflow API
  version: 1.0.0
  description: Enterprise API for managing document drafting, reviewing, and publishing workflows.
servers:
  - url: http://localhost:3000/api/v1
    description: Local Development
paths:
  /auth/login:
    post:
      summary: Authenticate User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Invalid Credentials
  /documents/{id}/approve:
    post:
      summary: Approve Document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  type: integer
                  description: Optimistic concurrency lock
      responses:
        '200':
          description: Document Approved
        '409':
          description: DOCUMENT_VERSION_CONFLICT
